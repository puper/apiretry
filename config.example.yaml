server:
  addr: ":8080"
  read_timeout: 15s
  write_timeout: 0s
  idle_timeout: 60s

upstream:
  base_url: "https://api.openai.com"
  timeout: 120s
  response_header_timeout: 20s
  tls_handshake_timeout: 10s
  idle_conn_timeout: 90s
  max_idle_conns: 200
  max_idle_conns_per_host: 100
  force_attempt_http2: true

retry:
  max_attempts: 5
  max_retry_delay_budget: 10s
  first_byte_timeout: 8s
  chunk_idle_timeout: 30s
  max_per_retry_delay: 3s
  retry_status_codes:
    - 429
    - 500
    - 502
    - 503
    - 504
  schedule_429:
    - 200ms
    - 500ms
    - 1s
    - 2s
    - 3s
  schedule_5xx:
    - 100ms
    - 300ms
    - 700ms
    - 1500ms
    - 2500ms
  jitter_percent: 0.15

limits:
  max_request_body_bytes: 10485760

logging:
  level: info
  json: true